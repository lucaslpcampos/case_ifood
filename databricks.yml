bundle:
  name: ifood-taxi-nyc
  uuid: 53f5f430-08d1-4ecd-8fd4-cbfb00e477c2

include:
  - resources/workflow.yaml

sync:
  exclude:
    - tests/
    - tests/**
    - docs/
    - docs/**

variables:
  catalog:
    description: Unity Catalog root
    default: ifood

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
